{% load static %}
{% load crispy_forms_tags %}
<!DOCTYPE html>
<html>
<head>
    <title>Set New Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Form inputs focus - green border */
        .form-control:focus {
            border-color: #198754 !important;
            box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25) !important;
        }
        
        /* Links - green color */
        a {
            color: #198754;
        }
        
        a:hover {
            color: #146c43;
        }
        
        /* Card header - green background */
        .card-header {
            background-color: #198754;
            color: white;
        }
        
        /* Optional: Make labels green too */
        label {
            color: #198754;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 mt-5">
                <div class="card">
                    <div class="card-header">
                        <h3>Enter New Password</h3>
                    </div>
                    <div class="card-body">
                        {% if validlink %}
                            <p>Please enter your new password twice.</p>
                            <form method="POST">
                                {% csrf_token %}
                                {{ form|crispy }}
                                <button type="submit" class="btn btn-success w-100 mt-3">Reset Password</button>
                            </form>
                        {% else %}
                            <div class="alert alert-danger">
                                This password reset link is invalid or has expired.
                            </div>
                            <a href="{% url 'password_reset' %}" class="btn btn-success">Request New Link</a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
